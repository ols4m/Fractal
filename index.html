<!DOCTYPE HTML>
<html>
<head>

  <!-- iOS optimization -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- SEO -->
  <meta charset="UTF-8">
  <meta name="description" content="Fractal — An AI tool for idea synthesis. Map the structural forces, tensions, and patterns shaping any big question.">
  <meta name="keywords" content="Fractal,AI,Knowledge Graph,Idea Synthesis,Research,Visualization">
  <meta name="author" content="Fractal Team">

  <!-- Page title -->
  <title>Fractal</title>

  <!-- Load 3rd party CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.16.1/vis.css" type="text/css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shepherd/1.7.0/css/shepherd-theme-arrows.css" type="text/css" />
  <link rel="stylesheet" href="https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css" type="text/css" />

  <!-- Load Fractal CSS -->
  <link rel="stylesheet" href="./css/style.css"        type="text/css"/>
  <link rel="stylesheet" href="./css/bar.css"          type="text/css"/>
  <link rel="stylesheet" href="./css/buttongroup.css"  type="text/css"/>
  <link rel="stylesheet" href="./css/shepherd-custom.css" type="text/css"/>
  <link rel="stylesheet" href="./css/commafield.css?v=3"   type="text/css"/>
  <link rel="stylesheet" href="./css/welcome.css"      type="text/css"/>
  <link rel="stylesheet" href="./css/modals.css"       type="text/css"/>
  <link rel="stylesheet" href="./css/progress.css"     type="text/css"/>
  <link rel="stylesheet" href="./css/fractal.css"      type="text/css"/>

</head>
<body>

  <!-- Top search bar -->
  <div id="formbox" class="transparent-blur">
    <div class="brutalist-field" id="input" onclick="document.getElementById('fractal-typing').focus()">
      <input class="brutalist-typing" id="fractal-typing" type="text" placeholder="Ask Fractal anything..." />
    </div>
    <button id="submit" type="button" title="Generate a Fractal map of this idea" class="fractal-btn">MAP</button>
    <button id="random" type="button" title="Try a random topic" class="fractal-btn random">⇄</button>
    <button id="clear" type="button" title="Clear the map" class="fractal-btn trash" style="display: none;">✕</button>
  </div>

  <!-- Bottom right buttons -->
  <div id="buttons" class="button-container transparent-blur">
    <button id="theme-toggle" type="button" title="Toggle dark/light mode">
      <i class="icon ion-ios-sunny"></i>
    </button>
    <button id="github" type="button" title="View Fractal on GitHub">
      <i class="icon ion-social-github"></i>
    </button>
    <button id="about" type="button" title="About Fractal">
      <i class="icon ion-ios-book"></i>
    </button>
    <button id="help" type="button" title="Help">
      <i class="icon ion-help-circled"></i>
    </button>
  </div>

  <!-- Graph container -->
  <div id="container" class="fullscreen">

    <!-- Intro Card -->
    <div id="info">
      <div class="card">
        <div class="card-pattern-grid"></div>
        <div class="card-overlay-dots"></div>
        <div class="card-title-area">Fractal</div>
        <div class="card-body">
          <p class="card-description">Ask any big question. Fractal maps the forces, tensions, and hidden patterns shaping it.</p>
          <div class="feature-grid">
            <div class="feature-item">
              <div class="feature-icon"><svg viewBox="0 0 98 96" width="14" height="14" fill="white"><path fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"/></svg></div>
              <span class="feature-text">GitHub</span>
            </div>
            <div class="feature-item">
              <div class="feature-icon"><svg viewBox="0 0 24 24" width="14" height="14" fill="white"><path d="M21 5H3a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1zm-1 12H4V7h16v10zm-3-7H7v2h10v-2zm-4 4H7v2h6v-2z"/></svg></div>
              <span class="feature-text">About</span>
            </div>
            <div class="feature-item">
              <div class="feature-icon"><svg viewBox="0 0 24 24" width="14" height="14" fill="white"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/></svg></div>
              <span class="feature-text">Theme</span>
            </div>
            <div class="feature-item">
              <div class="feature-icon"><svg viewBox="0 0 24 24" width="14" height="14" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-5h2v2h-2zm1-10C9.79 5 8 6.79 8 9h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/></svg></div>
              <span class="feature-text">Help</span>
            </div>
          </div>
          <div class="card-actions">
            <button class="card-button" onclick="document.getElementById('info').style.display='none'">Get Started</button>
          </div>
        </div>
        <div class="accent-shape"></div>
        <div class="corner-slice"></div>
      </div>
    </div>

    <!-- Node info panel (shows summary when node is clicked) -->
    <div id="node-panel" class="node-panel hidden">
      <button id="node-panel-close" class="node-panel-close">✕</button>
      <h3 id="node-panel-title"></h3>
      <p id="node-panel-summary"></p>
    </div>

  </div>

  <!-- 3rd Party Scripts -->
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.16.1/vis-network.min.js"></script>
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/1.5.12/clipboard.min.js"></script>
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/tether/1.3.3/js/tether.min.js"></script>
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/shepherd/1.7.0/js/shepherd.min.js"></script>

  <!-- Fractal Scripts -->
  <!-- fractal_api.js REPLACES wikipedia_parse.js -->
  <script type="text/javascript" src="./js/fractal_api.js?v=15"></script>
  <script type="text/javascript" src="./js/helpers.js"></script>
  <script type="text/javascript" src="./js/main_functions.js"></script>
  <script type="text/javascript" src="./js/main.js"></script>
  <script type="text/javascript" src="./js/help.js"></script>
  <script type="text/javascript" src="./js/bindings.js"></script>
  <script type="text/javascript" src="./js/commafield.js?v=2"></script>
  <script type="text/javascript" src="./js/network_serialize.js"></script>
  <script type="text/javascript" src="./js/loadsaved.js"></script>
  <script type="text/javascript" src="./js/modals.js"></script>
  <script type="text/javascript" src="./js/progress.js"></script>

  <script>
    window.onload = function () {
      bind();
      loadSaved();

      // Node click → show info panel
      if (window.network) {
        window.network.on("click", function (params) {
          if (params.nodes.length > 0) {
            const nodeName = params.nodes[0];
            const summary  = getFractalNodeSummary(nodeName);
            if (summary) {
              document.getElementById("node-panel-title").textContent   = nodeName;
              document.getElementById("node-panel-summary").textContent = summary;
              document.getElementById("node-panel").classList.remove("hidden");
            }
          }
        });
      }

      // Close node panel
      document.getElementById("node-panel-close").addEventListener("click", function () {
        document.getElementById("node-panel").classList.add("hidden");
      });

      setTimeout(function() { initThemeToggle(); }, 500);
      // Re-apply theme after vis.js canvas is created
      setTimeout(function() {
        const canvas = document.querySelector('#container canvas');
        if (canvas) {
          canvas.style.backgroundColor = '#f8f8fc';
        }
      }, 1000);
    };
  </script>

</body>
</html>
